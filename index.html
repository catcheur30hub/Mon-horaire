<style>
:root{--bg:#fff;--bg2:#f5f5f7;--bg3:#ebebed;--bd:#d2d2d7;--bd2:#e5e5ea;--tx:#1d1d1f;--tx2:#6e6e73;--tx3:#aeaeb2;--green:#34c759;--gbg:#f0fff4;--red:#ff3b30;--rbg:#fff5f5;--blue:#007aff;--bbg:#f0f8ff;--sb:env(safe-area-inset-bottom,0px);}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--bd:#3a3a3c;--bd2:#2c2c2e;--tx:#f5f5f7;--tx2:#8e8e93;--tx3:#636366;--gbg:#0d2818;--rbg:#2d0a0a;--bbg:#0a1f3d;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden;}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:calc(60px + var(--sb));}
.header{background:var(--bg);padding:12px 16px 8px;position:sticky;top:0;z-index:50;border-bottom:0.5px solid var(--bd2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.header-title{font-size:20px;font-weight:700;color:var(--tx);}
.today-btn{font-size:13px;color:var(--blue);font-weight:500;background:none;border:none;cursor:pointer;padding:4px 8px;}
.view-tabs{display:flex;background:var(--bg2);border-radius:9px;padding:2px;gap:2px;}
.view-tab{flex:1;padding:6px 0;border-radius:7px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;}
.view-tab.active{background:var(--bg);color:var(--tx);box-shadow:0 1px 4px rgba(0,0,0,0.12);}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.nav-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg2);cursor:pointer;font-size:16px;color:var(--tx2);display:flex;align-items:center;justify-content:center;}
.nav-title{font-size:17px;font-weight:600;color:var(--tx);}
.legend-wrap{padding:8px 12px;display:flex;flex-wrap:wrap;gap:6px;border-bottom:0.5px solid var(--bd2);}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--tx2);}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}

/* MOIS */
.month-hdr{display:grid;grid-template-columns:repeat(7,1fr);}
.day-hdr{text-align:center;font-size:11px;font-weight:500;color:var(–tx2);padding:6px 0;}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.day-cell{border-top:0.5px solid var(–bd2);border-right:0.5px solid var(–bd2);min-height:90px;padding:4px 3px;position:relative;cursor:pointer;background:var(–bg);}
.day-cell:nth-child(7n){border-right:none;}
.day-cell.empty{background:var(–bg2);}
.day-cell.weekend{background:color-mix(in srgb,var(–bg) 97%,var(–tx) 3%);}
.day-num{display:inline-flex;width:24px;height:24px;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(–tx);border-radius:50%;margin-bottom:2px;}
.day-cell.today .day-num{background:#1B3A6B;color:white;}
.ev-wrap{margin-bottom:2px;}
.ev-pill{font-size:9px;padding:2px 4px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;cursor:pointer;display:block;user-select:none;touch-action:none;}
.ev-pill.hach{text-decoration:line-through;opacity:0.55;background-image:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(0,0,0,0.15) 3px,rgba(0,0,0,0.15) 4px);}
.ev-note-s{font-size:8px;color:var(–tx2);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 2px;}
.add-btn{position:absolute;bottom:2px;right:2px;width:16px;height:16px;border-radius:50%;border:0.5px solid var(–bd);background:var(–bg);color:var(–tx2);font-size:13px;display:none;align-items:center;justify-content:center;cursor:pointer;}
.day-cell:hover .add-btn,.day-cell:active .add-btn{display:flex;}

/* SEMAINE */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.week-col{border-right:0.5px solid var(–bd2);min-height:420px;padding:4px 3px;position:relative;cursor:pointer;background:var(–bg);}
.week-col:last-child{border-right:none;}
.week-col.today{background:color-mix(in srgb,var(–bg) 95%,#1B3A6B 5%);}
.week-day-name{font-size:10px;color:var(–tx2);font-weight:500;text-align:center;}
.week-day-num{display:flex;width:26px;height:26px;align-items:center;justify-content:center;font-size:13px;font-weight:600;border-radius:50%;color:var(–tx);margin:2px auto 5px;}
.week-col.today .week-day-num{background:#1B3A6B;color:white;}
.week-ev-wrap{margin-bottom:3px;}
.week-ev{font-size:9px;padding:3px 4px;border-radius:3px;display:block;cursor:pointer;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.week-ev.hach{text-decoration:line-through;opacity:0.55;}
.week-ev-note{font-size:8px;color:var(–tx2);font-style:italic;padding:0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.week-add-btn{position:absolute;bottom:3px;right:3px;width:16px;height:16px;border-radius:50%;border:0.5px solid var(–bd);background:var(–bg);color:var(–tx2);font-size:13px;display:none;align-items:center;justify-content:center;cursor:pointer;}
.week-col:hover .week-add-btn,.week-col:active .week-add-btn{display:flex;}

/* JOUR */
.day-wrap{padding:16px;}
.day-big{font-size:26px;font-weight:700;color:var(–tx);margin-bottom:4px;}
.day-sub{font-size:14px;color:var(–tx2);margin-bottom:20px;}
.day-ev-row{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:0.5px solid var(–bd2);cursor:pointer;}
.day-ev-row:active{opacity:0.7;}
.day-ev-bar{width:4px;border-radius:2px;align-self:stretch;min-height:20px;flex-shrink:0;}
.day-ev-body{flex:1;}
.day-ev-name{font-size:16px;font-weight:500;color:var(–tx);}
.day-ev-name.hach{text-decoration:line-through;opacity:0.5;}
.day-ev-note{font-size:13px;color:var(–tx2);margin-top:4px;}
.day-empty{text-align:center;padding:50px 20px;color:var(–tx2);font-size:15px;}
.day-footer{padding:14px 0;display:flex;justify-content:center;}
.day-add-big{padding:10px 28px;border-radius:10px;border:0.5px solid var(–green);background:var(–gbg);cursor:pointer;font-size:14px;font-weight:600;color:var(–green);}
.day-fab{position:fixed;bottom:calc(70px + var(–sb));right:20px;width:52px;height:52px;border-radius:50%;background:#1B3A6B;color:white;font-size:26px;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(27,58,107,0.4);z-index:40;}

/* DRAG */
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:0.9;border-radius:3px;padding:3px 10px;font-size:10px;font-weight:600;white-space:nowrap;transform:rotate(2deg) scale(1.08);box-shadow:0 4px 14px rgba(0,0,0,0.3);display:none;}
.ev-pill.dragging,.week-ev.dragging{opacity:0.3;}
.ev-pill.drag-over,.week-ev.drag-over{outline:2px solid #1B3A6B;outline-offset:1px;}

/* SHEET MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;}
.overlay.open{display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(–bg);border-radius:18px 18px 0 0;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;padding:12px 20px calc(20px + var(–sb));}
.sheet-handle{width:36px;height:4px;background:var(–bd);border-radius:2px;margin:0 auto 16px;}
.sheet-title{font-size:18px;font-weight:600;color:var(–tx);margin-bottom:14px;}
.sec{font-size:11px;font-weight:600;color:var(–tx2);text-transform:uppercase;letter-spacing:0.06em;margin:14px 0 8px;}
.btn-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px;}
.ev-btn{padding:10px 5px;border-radius:10px;border:none;cursor:pointer;font-size:11px;font-weight:600;text-align:center;line-height:1.3;position:relative;}
.ev-btn .ei{position:absolute;top:3px;right:4px;font-size:10px;opacity:0.55;}
.pickle-btn{border-radius:50%;aspect-ratio:1;width:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;border:none;cursor:pointer;position:relative;overflow:hidden;}
.pickle-btn svg{position:absolute;inset:0;width:100%;height:100%;}
.pickle-lbl{position:relative;z-index:1;font-size:9px;font-weight:700;line-height:1.2;text-align:center;}
.pickle-btn .ei{position:absolute;top:3px;right:4px;font-size:9px;opacity:0.55;z-index:2;}
.divider{border:none;border-top:0.5px solid var(–bd2);margin:14px 0;}
.edit-panel{background:var(–bg2);border-radius:12px;padding:12px;margin-bottom:10px;display:none;}
.edit-panel label{font-size:12px;color:var(–tx2);display:block;margin-bottom:5px;margin-top:8px;}
.edit-panel label:first-child{margin-top:0;}
.edit-input{width:100%;padding:10px 12px;border:0.5px solid var(–bd);border-radius:10px;font-size:15px;color:var(–tx);background:var(–bg);}
.cp-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.cp-sw{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.cp-sw.sel{border-color:var(–tx);transform:scale(1.15);}
.preview-pill{height:28px;border-radius:8px;display:flex;align-items:center;padding:0 12px;font-size:12px;font-weight:600;margin-bottom:8px;}
.scope-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.scope-btn{padding:10px 6px;border-radius:10px;border:0.5px solid var(–bd);background:var(–bg);font-size:12px;font-weight:500;text-align:center;cursor:pointer;line-height:1.3;color:var(–tx);}
.note-input{width:100%;padding:10px 12px;border:0.5px solid var(–bd);border-radius:10px;font-size:14px;color:var(–tx);background:var(–bg);margin-bottom:8px;}
.hachure-btn{width:100%;padding:12px;border-radius:10px;border:0.5px solid var(–bd);background:var(–bg2);background-image:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,0.05) 4px,rgba(0,0,0,0.05) 5px);cursor:pointer;font-size:14px;font-weight:500;color:var(–tx2);margin-bottom:8px;}
.hachure-btn.on{border-color:var(–green);background:var(–gbg);color:var(–green);background-image:none;}
.del-btn{width:100%;padding:12px;border-radius:10px;border:0.5px solid var(–red);background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:var(–red);margin-bottom:8px;}
.btn-row{display:flex;gap:8px;}
.btn-cancel{flex:1;padding:12px;border-radius:10px;border:0.5px solid var(–bd);background:var(–bg2);cursor:pointer;font-size:14px;font-weight:500;color:var(–tx);}
.btn-save{flex:1;padding:12px;border-radius:10px;border:none;background:#1B3A6B;cursor:pointer;font-size:14px;font-weight:600;color:white;}
.custom-box{background:var(–bg2);border-radius:12px;padding:12px;}
.custom-input{width:100%;padding:10px 12px;border:0.5px solid var(–bd);border-radius:10px;font-size:15px;color:var(–tx);background:var(–bg);margin-bottom:10px;}
.create-btn-c{width:100%;padding:12px;border-radius:10px;border:none;background:var(–bg3);cursor:pointer;font-size:14px;font-weight:600;color:var(–tx);}

.import-btn-top{position:fixed;top:12px;right:12px;z-index:60;padding:6px 12px;border-radius:20px;border:none;background:#1B3A6B;color:white;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(27,58,107,0.3);}
.import-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center;}
.import-overlay.open{display:flex;}
.import-box{background:white;border-radius:16px;padding:24px;width:90%;max-width:400px;}
.import-box h3{font-size:18px;font-weight:700;color:#1d1d1f;margin-bottom:8px;}
.import-box p{font-size:13px;color:#6e6e73;margin-bottom:14px;line-height:1.5;}
.import-textarea{width:100%;height:100px;padding:10px;border-radius:10px;border:1px solid #d2d2d7;font-size:12px;font-family:monospace;resize:none;margin-bottom:12px;}
.import-do-btn{width:100%;padding:14px;border-radius:12px;border:none;background:#1B3A6B;color:white;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.import-cancel{width:100%;padding:12px;border-radius:12px;border:1px solid #d2d2d7;background:transparent;font-size:14px;cursor:pointer;color:#1d1d1f;}
.import-msg{font-size:13px;text-align:center;padding:6px;border-radius:8px;margin-bottom:8px;display:none;}
.import-msg.ok{background:#f0fff4;color:#34c759;}
.import-msg.err{background:#fff5f5;color:#ff3b30;}
</style>

</head>

<script>
const MFR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DFR=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const DFUL=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

const DBTNS={
  jour9:{name:'Jour 7h-16h',bg:'#FFD600',text:'#5A4000',group:'work'},
  soir:{name:'Soir 15h-00h',bg:'#1B3A6B',text:'#B5D4F4',group:'work'},
  nuit9:{name:'Nuit 23h-8h',bg:'#444441',text:'#D3D1C7',group:'work'},
  jour12:{name:'Jour 7h30-19h30',bg:'#FFD600',text:'#5A4000',group:'work'},
  nuit12:{name:'Nuit 19h30-7h30',bg:'#2C2C2A',text:'#B4B2A9',group:'work'},
  off:{name:'OFF',bg:'#A0153E',text:'#FFD6E0',group:'other'},
  eve:{name:'🔒 ÈVE',bg:'#FF69B4',text:'#5A0030',group:'other'},
  rdv:{name:'📅 Rendez-vous',bg:'#FF6B00',text:'#fff',group:'other'},
  gym:{name:'💪 Gym',bg:'#7B2FBE',text:'#F0D9FF',group:'other'},
  autre:{name:'Autre',bg:'#FFE0B2',text:'#7A3A00',group:'other'},
  libre:{name:'Libre / Free',bg:'#FFCDD2',text:'#7B1A1A',group:'other'},

function cycleEv(date){const d=new Date(date.getFullYear(),date.getMonth(),date.getDate());const diff=Math.round((d-CS)/86400000);if(diff<0)return null;return CYCLE[diff%35]||null;}
function isOff(date){const d=new Date(date.getFullYear(),date.getMonth(),date.getDate());const diff=Math.round((d-CS)/86400000);if(diff<0)return false;return CYCLE[diff%35]===null;}

function dkey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function nkey(dk,label){return dk+'||'+label;}
function bkForLabel(l){for(const id in btns){if(btns[id].name===l)return id;}return null;}
function rlabel(bk,dk){if(dateStyles[dk]&&dateStyles[dk][bk+'_label'])return dateStyles[dk][bk+'_label'];return btns[bk]?btns[bk].name:bk;}
function rstyle(label,dk){
  if(dk&&dateStyles[dk]&&dateStyles[dk][label])return dateStyles[dk][label];
  for(const id in btns){if(btns[id].name===label)return {bg:btns[id].bg,text:btns[id].text};}
  if(customColors[label])return customColors[label];
  return {bg:'#ddd',text:'#333'};
}
function isHach(dk,l){return !!(hachured[nkey(dk,l)]);}
function isDel(dk,t){return !!(delFixed[dk]&&delFixed[dk].includes(t));}
function getNote(dk,l){return notes[nkey(dk,l)]||'';}

function getEvs(y,m,d){
  const date=new Date(y,m,d);const dk=dkey(y,m,d);const all=[];
  const ct=cycleEv(date);
  if(ct&&btns[ct]&&!isDel(dk,'cycle'))all.push({label:rlabel(ct,dk),bk:ct,fixed:true,ft:'cycle',dk});
  else if(isOff(date)&&!isDel(dk,'off'))all.push({label:rlabel('off',dk),bk:'off',fixed:true,ft:'off',dk});
  if(isSat(y,m,d)&&!isDel(dk,'eve'))all.push({label:rlabel('eve',dk),bk:'eve',fixed:true,ft:'eve',dk});
  if(eliteSet.has(dk)&&!isDel(dk,'elite'))all.push({label:rlabel('elite',dk),bk:'elite',fixed:true,ft:'elite',dk});
  (extra[dk]||[]).forEach((e,i)=>all.push({label:e,bk:bkForLabel(e),fixed:false,ei:i,dk}));
  if(dayOrder[dk]&&dayOrder[dk].length===all.length)return dayOrder[dk].map(i=>all[i]).filter(Boolean);
  return all;
}

function makeBlock(ev,idx,dk,isDrag){

const ghost=document.getElementById('dragGhost');
let dragActive=false,dragData=null,pressTimer=null,pressStart=null;
function initDrag(tag,dk,idx,label,style){
  tag.addEventListener('touchstart',e=>{pressStart={x:e.touches[0].clientX,y:e.touches[0].clientY};pressTimer=setTimeout(()=>{dragActive=true;dragData={dk,from:idx,to:idx};tag.classList.add('dragging');ghost.textContent=label;ghost.style.cssText=style+';display:block;';pg(e.touches[0].clientX,e.touches[0].clientY);if(navigator.vibrate)navigator.vibrate(40);},450);},{passive:true});
  tag.addEventListener('touchmove',e=>{const dx=Math.abs(e.touches[0].clientX-(pressStart?.x||0));const dy=Math.abs(e.touches[0].clientY-(pressStart?.y||0));if(!dragActive&&(dx>8||dy>8)){clearTimeout(pressTimer);return;}if(!dragActive)return;e.preventDefault();pg(e.touches[0].clientX,e.touches[0].clientY);udover(e.touches[0].clientX,e.touches[0].clientY,tag);},{passive:false});
  tag.addEventListener('touchend',e=>{clearTimeout(pressTimer);if(dragActive){fdrag(dk);}else{const dx=Math.abs((pressStart?.x||0)-(e.changedTouches[0]?.clientX||0));const dy=Math.abs((pressStart?.y||0)-(e.changedTouches[0]?.clientY||0));if(dx<8&&dy<8)tag._ov&&tag._ov();}},{passive:true});
  tag.addEventListener('touchcancel',()=>{clearTimeout(pressTimer);dragActive=false;dragData=null;ghost.style.display='none';tag.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));});
  tag.addEventListener('mousedown',e=>{if(e.button!==0)return;pressStart={x:e.clientX,y:e.clientY};pressTimer=setTimeout(()=>{dragActive=true;dragData={dk,from:idx,to:idx};tag.classList.add('dragging');ghost.textContent=label;ghost.style.cssText=style+';display:block;';pg(e.clientX,e.clientY);const om=ev=>{pg(ev.clientX,ev.clientY);udover(ev.clientX,ev.clientY,tag);};const ou=()=>{fdrag(dk);document.removeEventListener('mousemove',om);document.removeEventListener('mouseup',ou);};document.addEventListener('mousemove',om);document.addEventListener('mouseup',ou);},450);});
  tag.addEventListener('click',e=>{const dx=Math.abs(e.clientX-(pressStart?.x||0));const dy=Math.abs(e.clientY-(pressStart?.y||0));if(!dragActive&&dx<5&&dy<5){e.stopPropagation();tag._ov&&tag._ov();}});
  tag.addEventListener('mouseup',()=>clearTimeout(pressTimer));
}
function pg(x,y){ghost.style.left=(x+10)+'px';ghost.style.top=(y-14)+'px';}
function udover(x,y,src){document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));const el=document.elementFromPoint(x,y);const t=el?.closest('.ev-pill');if(t&&t!==src&&t.dataset.dk===dragData?.dk){t.classList.add('drag-over');dragData.to=parseInt(t.dataset.idx||'0');}}
function fdrag(dk){ghost.style.display='none';document.querySelectorAll('.dragging,.drag-over').forEach(el=>el.classList.remove('dragging','drag-over'));if(dragData&&dragData.from!==dragData.to&&dragData.dk===dk){const[y,m,d]=dk.split('-').map(Number);const evs=getEvs(y,m-1,d);const n=evs.length;const o=[...Array(n).keys()];o.splice(dragData.from,1);o.splice(dragData.to,0,dragData.from);dayOrder[dk]=o;saveDayOrder();render();}dragActive=false;dragData=null;}

function applyEvChange(scope){
  const newName=document.getElementById('evName').value.trim()||aLabel;
  const bg=svBg;const text=svTx||'#fff';
  if(!aDay||!aLabel||!bg)return;
  // Sauvegarder la note
  const noteVal=document.getElementById('evNote').value.trim();
  const nk=nkey(aDay,aLabel);
  if(noteVal)notes[nk]=noteVal;else delete notes[nk];
  if(scope==='one'){
    if(!dateStyles[aDay])dateStyles[aDay]={};dateStyles[aDay][aLabel]={bg,text};
    if(newName!==aLabel){dateStyles[aDay][newName]={bg,text};if(aEi!==null&&extra[aDay])extra[aDay][aEi]=newName;}
    saveDateStyles();
  } else {
    if(aBk&&btns[aBk]){btns[aBk]={...btns[aBk],name:newName,bg,text};saveBtns();}
    else{if(newName!==aLabel){Object.keys(extra).forEach(dk=>{if(extra[dk])extra[dk]=extra[dk].map(e=>e===aLabel?newName:e);});delete customColors[aLabel];}customColors[newName]={bg,text};}
  }
  saveAll();closeSheet();render();
}

document.getElementById('btnScopeAll').addEventListener('click',()=>{

  btns[eBk]={...btns[eBk],name,bg:col.bg,text:col.text};saveBtns();
  showPanels(false,false,false,true);renderBtnGroups();eBk=null;render();
});

function renderBtnGroups(){
  const groups={work:'workBtns',other:'otherBtns',sport:'sportBtns'};
  Object.entries(groups).forEach(([g,id])=>{
    const el=document.getElementById(id);el.innerHTML='';
    Object.entries(btns).filter(([,b])=>b.group===g).forEach(([bk,b])=>{
      if(bk==='pickleball'){
        const tc=b.text;const btn=document.createElement('button');btn.className='pickle-btn';btn.style.cssText=`background:${b.bg};box-shadow:0 0 0 2px ${tc};`;
        btn.innerHTML=`<svg viewBox="0 0 60 60"><circle cx="30" cy="10" r="3" fill="${tc}" opacity="0.25"/><circle cx="18" cy="17" r="3" fill="${tc}" opacity="0.25"/><circle cx="42" cy="17" r="3" fill="${tc}" opacity="0.25"/><circle cx="10" cy="27" r="3" fill="${tc}" opacity="0.25"/><circle cx="30" cy="25" r="3" fill="${tc}" opacity="0.25"/><circle cx="50" cy="27" r="3" fill="${tc}" opacity="0.25"/><circle cx="18" cy="37" r="3" fill="${tc}" opacity="0.25"/><circle cx="42" cy="37" r="3" fill="${tc}" opacity="0.25"/><circle cx="30" cy="43" r="3" fill="${tc}" opacity="0.25"/></svg><div class="pickle-lbl" style="color:${tc};">${b.name}</div><span class="ei" data-key="${bk}" style="color:${tc};">✎</span>`;
        btn.addEventListener('click',e=>{if(e.target.dataset.key){e.stopPropagation();openBtnEdit(e.target.dataset.key);}else addBtnEv(bk);});el.appendChild(btn);
      } else {
        const btn=document.createElement('button');btn.className='ev-btn';btn.style.cssText=`background:${b.bg};color:${b.text};`;
        btn.innerHTML=`${b.name}<span class="ei" data-key="${bk}">✎</span>`;
        btn.addEventListener('click',e=>{if(e.target.dataset.key){e.stopPropagation();openBtnEdit(e.target.dataset.key);}else addBtnEv(bk);});el.appendChild(btn);
      }
    });
  });
}

function renderCPRow(id,mode){
  const cp=document.getElementById(id);if(!cp)return;cp.innerHTML='';
  const cols=getColors();const selBg=mode==='view'?svBg:mode==='edit'?seBg:scBg||cols[0].bg;
  cols.forEach(c=>{
    const s=document.createElement('div');s.className='cp-sw'+(c.bg===selBg?' sel':'');s.style.background=c.bg;s.title=c.name||'';
    s.addEventListener('click',()=>{document.querySelectorAll('#'+id+' .cp-sw').forEach(x=>x.classList.remove('sel'));s.classList.add('sel');
      if(mode==='view'){svBg=c.bg;svTx=c.text;const p=document.getElementById('evPreview');if(p){p.style.background=c.bg;p.style.color=c.text;p.textContent=document.getElementById('evName').value||'Aperçu';}}
      else if(mode==='edit')seBg=c.bg;
      else{scBg=c.bg;scTx=c.text;}
    });cp.appendChild(s);
  });
}

function addBtnEv(bk){if(!aDay)return;if(!extra[aDay])extra[aDay]=[];extra[aDay].push(btns[bk].name);saveAll();closeSheet();render();}
function createCustom(){
  const name=document.getElementById('customName').value.trim();if(!name)return;const cols=getColors();const col=cols.find(c=>c.bg===scBg)||cols[0];
  customColors[name]={bg:col.bg,text:col.text};if(!extra[aDay])extra[aDay]=[];extra[aDay].push(name);saveAll();closeSheet();render();
}
function closeSheet(){document.getElementById('overlay').classList.remove('open');aDay=null;aLabel=null;}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeSheet();});


function doImport() {
  const text = document.getElementById('importText').value.trim();
  const msg = document.getElementById('importMsg');
  if (!text) { msg.textContent='⚠️ Colle d\'abord le texte exporté !'; msg.className='import-msg err'; msg.style.display='block'; return; }
  try {
    const data = JSON.parse(text);
    const keys = ['cal_btns','cal5_extra','cal5_hachured','cal5_delfixed','cal5_customcol','cal5_notes','cal5_order','cal5_datestyles'];
    let count = 0;
    keys.forEach(k => { if(data[k]) { localStorage.setItem(k, data[k]); count++; } });
    if (count === 0) throw new Error('Aucune donnée valide');
    msg.textContent='✅ Données importées ! La page va se recharger...'; msg.className='import-msg ok'; msg.style.display='block';
    setTimeout(() => { document.getElementById('importOverlay').classList.remove('open'); location.reload(); }, 1500);
  } catch(e) {
    msg.textContent='❌ Texte invalide. Assure-toi de tout copier depuis l\'exportateur.'; msg.className='import-msg err'; msg.style.display='block';
  }
}
